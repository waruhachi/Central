name: Build

on:
    push:
    workflow_dispatch:

jobs:
    build:
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@main

            - name: Cache Theos
              id: cache-theos
              uses: actions/cache@main
              with:
                  path: theos
                  key: theos

            - name: Checkout theos/theos
              if: steps.cache-theos.outputs.cache-hit != 'true'
              uses: actions/checkout@main
              with:
                  repository: theos/theos
                  ref: master
                  submodules: recursive
                  path: theos

            - name: Checkout theos/sdks
              if: steps.cache-theos.outputs.cache-hit != 'true'
              uses: actions/checkout@main
              with:
                  repository: theos/sdks
                  path: theos/sdks

            - name: Install Build Dependencies
              run: |
                  brew list make || brew install make; brew list xz || brew install xz; brew list ldid || brew install ldid

            - name: Build Package
              run: |
                  export THEOS=theos
                  gmake clean package FINALPACKAGE=1
                  gmake clean package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless

            - name: Upload Build Artifacts
              uses: actions/upload-artifact@v4
              with:
                  path: packages/*.deb
